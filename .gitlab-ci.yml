stages:
  - build
  - deploy

.shared_cache: &shared_cache
  before_script:
    - echo -e "\e[0Ksection_start:`date +%s`:installing_deps\r\e[0KInstalling deps"
    - export PATH="$PNPM_HOME:$PATH"
    - corepack enable pnpm
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
    - echo -e "\e[0Ksection_end:`date +%s`:installing_deps\r\e[0K"
  cache:
    - key:
        files:
          - pnpm-lock.yaml
        prefix: pnpm
      paths:
        - .pnpm-store/
      policy: pull-push
    - key: "turbo-cache-$CI_COMMIT_REF_SLUG"
      fallback_keys:
        - "turbo-cache-protected"
      paths:
        - .turbo/
        - "_*/*/.turbo/"
      policy: pull-push
  variables:
    PNPM_HOME: "/pnpm"
    DO_NOT_TRACK: "1"

.node_job: &node_job
  <<: *shared_cache
  image:
    name: node:24.14.0-trixie-slim
    pull_policy: if-not-present
  tags:
    - purpose::build
    - type::docker

.release_rules: &release_rules
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v?[0-9]+\.[0-9]+\.[0-9]+$/'

build:
  stage: build
  <<: *node_job
  script:
    - echo -e "\e[0Ksection_start:`date +%s`:build\r\e[0KBuild"
    - pnpm turbo run build
    - echo -e "\e[0Ksection_end:`date +%s`:build\r\e[0K"

    - echo -e "\e[0Ksection_start:`date +%s`:test\r\e[0KTest"
    - pnpm turbo run test
    - echo -e "\e[0Ksection_end:`date +%s`:test\r\e[0K"

publish_npm:
  stage: deploy
  <<: [*node_job, *release_rules]
  needs:
    - build
  script:
    - test -n "$NPM_TOKEN"
    - export RELEASE_VERSION="${CI_COMMIT_TAG#v}"
    - export NPM_CONFIG_USERCONFIG="$CI_PROJECT_DIR/.npmrc.publish"
    - printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$NPM_CONFIG_USERCONFIG"

    - pnpm --dir _libs/core version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
    - pnpm --dir _libs/cli version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

    - echo -e "\e[0Ksection_start:`date +%s`:build\r\e[0KBuild packages"
    - pnpm turbo run build --filter=@confederation/core --filter=@confederation/cli
    - echo -e "\e[0Ksection_end:`date +%s`:build\r\e[0K"

    - echo -e "\e[0Ksection_start:`date +%s`:npm_publish\r\e[0KNPM publish"
    - pnpm --dir _libs/core publish --access public --no-git-checks
    - pnpm --dir _libs/cli publish --access public --no-git-checks
    - echo -e "\e[0Ksection_end:`date +%s`:npm_publish\r\e[0K"

publish_vscode:
  stage: deploy
  <<: [*node_job, *release_rules]
  needs:
    - build
  script:
    - test -n "$VSCE_PAT"
    - export RELEASE_VERSION="${CI_COMMIT_TAG#v}"
    - pnpm --dir _libs/vscode version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

    - echo -e "\e[0Ksection_start:`date +%s`:build\r\e[0KBuild extension"
    - pnpm turbo run build --filter=confederation
    - echo -e "\e[0Ksection_end:`date +%s`:build\r\e[0K"

    - echo -e "\e[0Ksection_start:`date +%s`:vscode_publish\r\e[0KVSCode Marketplace publish"
    - pnpm --dir _libs/vscode exec vsce publish
    - echo -e "\e[0Ksection_end:`date +%s`:vscode_publish\r\e[0K"
