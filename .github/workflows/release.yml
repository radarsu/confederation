name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm turbo run build
      - run: pnpm turbo run test

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org
      - name: Set release version
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          pnpm --dir _libs/core version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
          pnpm --dir _libs/cli version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
      - run: pnpm turbo run build --filter=@confederation/core --filter=@confederation/cli
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          pnpm --dir _libs/core publish --access public --no-git-checks
          pnpm --dir _libs/cli publish --access public --no-git-checks

  publish-vscode:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Set release version
        run: pnpm --dir _libs/vscode version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - run: pnpm turbo run build --filter=confederation
      - name: Publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm --dir _libs/vscode exec vsce publish
